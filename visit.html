<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HNxAMAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blood: #8B0000;
      --blood-bright: #CC0000;
      --blood-glow: #FF2222;
      --blood-dark: #3D0000;
      --base: #1c1515;
      --shadow-dark: rgba(0, 0, 0, 0.65);
      --shadow-light: rgba(120, 50, 50, 0.16);
      --text: #f5e6e6;
      --text-muted: rgba(245, 230, 230, 0.55);
    }

    /* Animatable angle for the rotating-line borders */
    @property --angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    @keyframes spinBorder {
      to { --angle: 360deg; }
    }

    html, body {
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      background: var(--base);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 8s ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,0,0,0.45) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(100,0,0,0.35) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation-delay: 3s;
    }

    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(180,0,0,0.2) 0%, transparent 70%);
      top: 40%; left: 60%;
      animation-delay: 5s;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(139,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,0,0,0.07) 1px, transparent 1px);
      background-size: 50px 50px;
      transform: perspective(600px) rotateX(20deg) scale(1.3);
      transform-origin: center bottom;
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 48px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── PROFILE ── */
    .profile-ring {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: fadeDown 0.8s ease both;
    }

    .profile-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        var(--blood-glow) 0deg,
        var(--blood) 90deg,
        var(--blood-dark) 180deg,
        var(--blood) 270deg,
        var(--blood-glow) 360deg
      );
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    .profile-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        var(--blood-glow) 0deg,
        var(--blood) 90deg,
        var(--blood-dark) 180deg,
        var(--blood) 270deg,
        var(--blood-glow) 360deg
      );
      filter: blur(10px);
      opacity: 0.7;
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Thin rotating gradient-line border around the photo */
    .profile-frame {
      position: relative;
      z-index: 1;
      width: 120px;
      height: 120px;
      padding: 4px;
      border-radius: 50%;
    }

    .profile-frame::before {
      --angle: 0deg;
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-dark) 35deg,
        var(--blood-glow) 90deg,
        var(--blood-dark) 145deg,
        transparent 200deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 5s linear infinite;
      pointer-events: none;
    }

    .profile-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--base);
      display: block;
      box-shadow:
        8px 8px 18px var(--shadow-dark),
        -6px -6px 16px var(--shadow-light);
    }

    /* ── NAME ── */
    .name {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-align: center;
      background: linear-gradient(135deg, #fff 0%, #ffcccc 40%, var(--blood-bright) 70%, #ff6666 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: orange;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(200,0,0,0.5));
      animation: fadeDown 0.9s 0.1s ease both;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0em;
      text-transform: uppercase;
      color: white;
      text-align: center;
      animation: fadeDown 1s 0.2s ease both;
      margin-bottom: 36px;
    }

    /* ── DIVIDER (neumorphic groove) ── */
    .divider {
      width: 60%;
      height: 8px;
      border-radius: 10px;
      background: var(--base);
      box-shadow:
        inset 4px 4px 8px var(--shadow-dark),
        inset -3px -3px 7px var(--shadow-light);
      margin-bottom: 36px;
      animation: fadeIn 1s 0.3s ease both;
      position: relative;
    }

    .divider::before {
      content: '✦';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: var(--blood-bright);
      background: var(--base);
      padding: 0 8px;
      filter: drop-shadow(0 0 4px var(--blood-glow));
    }

    /* ── VIDEO GRID ── */
    .video-section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 18px;
      animation: fadeIn 1s 0.35s ease both;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      width: 100%;
      margin-bottom: 36px;
    }

    .video-card {
      position: relative;
      padding: 6px;
      border-radius: 10px;
      background: var(--base);
      box-shadow:
        9px 9px 20px var(--shadow-dark),
        -8px -8px 18px var(--shadow-light);
      animation: slideUp 0.6s ease both;
    }

    .video-card:nth-child(1) { animation-delay: 0.40s; }
    .video-card:nth-child(2) { animation-delay: 0.48s; }
    .video-card:nth-child(3) { animation-delay: 0.56s; }
    .video-card:nth-child(4) { animation-delay: 0.64s; }
    .video-card:nth-child(5) { animation-delay: 0.72s; }
    .video-card:nth-child(6) { animation-delay: 0.80s; }

    /* Rotating gradient-line border, same as link cards */
    .video-card::before {
      --angle: 0deg;
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-dark) 35deg,
        var(--blood-glow) 90deg,
        var(--blood-dark) 145deg,
        transparent 200deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 5s linear infinite;
      pointer-events: none;
      opacity: 0.85;
    }

    .video-el {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 12px;
      object-fit: cover;
      background: #000;
    }

    /* ── AUTO SLIDESHOW ── */
    .slideshow-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 16px;
      border-radius: 18px;
      padding: 6px;
      background: var(--base);
      box-shadow:
        9px 9px 20px var(--shadow-dark),
        -8px -8px 18px var(--shadow-light);
      animation: slideUp 0.1s 0.1s ease both;
      --angle: 0deg;
    }

    .slideshow-wrap::before {
      --angle: 0deg;
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-dark) 35deg,
        var(--blood-glow) 90deg,
        var(--blood-dark) 145deg,
        transparent 200deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 5s linear infinite;
      pointer-events: none;
    }

    .slideshow {
      position: relative;
      width: 100%;
      aspect-ratio: 14 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
      border-radius: 12px;
    }

    .slide.active {
      opacity: 1;
    }

    .slide-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      padding-bottom: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blood-dark);
      border: 1px solid var(--blood);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: var(--blood-glow);
      transform: scale(1.4);
      box-shadow: 0 0 6px var(--blood-glow);
    }

    /* ── MAIN FEATURED VIDEO ── */
    .main-video-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 18px;
      padding: 6px;
      background: var(--base);
      box-shadow:
        9px 9px 20px var(--shadow-dark),
        -8px -8px 18px var(--shadow-light);
      animation: slideUp 0.6s 0.38s ease both;
      --angle: 0deg;
    }

    .main-video-wrap::before {
      --angle: 0deg;
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-dark) 35deg,
        var(--blood-glow) 90deg,
        var(--blood-dark) 145deg,
        transparent 200deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 5s linear infinite;
      pointer-events: none;
    }

    .main-video-label {
      font-family: 'cinzel', serif;
      font-size: 0.60rem;
      font-weight: 800;
      letter-spacing: 0em;
      text-transform: uppercase;
      color: yellow;
      margin-bottom: 8px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 1px;
    }

    .main-video-label::before {
      content: '';
      font-size: 8px;
      filter: drop-shadow(0 0 4px var(--blood-glow));
    }

    .main-video-el {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      object-fit: cover;
      background: #000;
    }

    /* ── FULLSCREEN BUTTON ── */
    .video-wrapper {
      position: relative;
      z-index: 1;
      display: block;
      line-height: 0;
    }

    /* ── VISIT NOW BUTTON ── */
    .visit-btn {
      --angle: 0deg;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: auto;
      padding: 12px 28px;
      border-radius: 100px;
      background: var(--base);
      border: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      box-shadow:
        9px 9px 20px var(--shadow-dark),
        -8px -8px 18px var(--shadow-light);
      transition: box-shadow 0.25s ease, transform 0.15s ease;
      animation: slideUp 0.6s 0.4s ease both;
      margin-bottom: 30px;
    }

    .visit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-dark) 35deg,
        var(--blood-glow) 90deg,
        var(--blood-dark) 145deg,
        transparent 200deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 5s linear infinite;
      pointer-events: none;
      opacity: 0.9;
    }

    .visit-btn:hover,
    .visit-btn:focus-visible {
      box-shadow:
        inset 6px 6px 14px var(--shadow-dark),
        inset -5px -5px 12px var(--shadow-light);
    }

    .visit-btn:hover .visit-arrow {
      transform: translateX(4px);
      color: var(--blood-bright);
    }

    .visit-btn:active {
      transform: scale(0.97);
      box-shadow:
        inset 7px 7px 16px var(--shadow-dark),
        inset -6px -6px 13px var(--shadow-light);
    }

    .visit-arrow {
      transition: transform 0.3s ease, color 0.3s ease;
    }

    /* ── FOOTER (neumorphic pill + rotating line border) ── */
    footer {
      --angle: 0deg;
      margin-top: 30px;
      margin-bottom: 30px;
      padding: 12px 30px;
      font-size: 12px;
      text-align: center;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
      color: white;
      background: var(--base);
      border-radius: 100px;
      border: none;
      box-shadow:
        6px 6px 14px var(--shadow-dark),
        -5px -5px 12px var(--shadow-light);
      position: relative;
      z-index: 1;
    }

    footer::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      background: conic-gradient(
        from var(--angle),
        transparent 0deg,
        var(--blood-glow) 70deg,
        transparent 170deg,
        transparent 360deg
      );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      animation: spinBorder 6s linear infinite;
      pointer-events: none;
      opacity: 0.7;
    }

    footer .yellow {
      color: #f0b429;
      font-weight: 700;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) translateZ(0); }
      to   { opacity: 1; transform: translateY(0) translateZ(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── PARTICLES ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--blood-bright);
      opacity: 0;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
    }
  </style>
</head>

  <script>
    // Auto Slideshow
    (function() {
      const slides = document.querySelectorAll('.slide');
      const dotsContainer = document.getElementById('slideDots');
      let current = 0;

      // Create dots
      slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(d);
      });

      function goTo(n) {
        slides[current].classList.remove('active');
        dotsContainer.children[current].classList.remove('active');
        current = (n + slides.length) % slides.length;
        slides[current].classList.add('active');
        dotsContainer.children[current].classList.add('active');
      }

      setInterval(() => goTo(current + 1), 3000);
    })();

    // Generate particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = (Math.random() * 2 + 1) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (Math.random() * 12 + 8) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.opacity = Math.random() * 0.5;
      container.appendChild(p);
    }
  </script>
